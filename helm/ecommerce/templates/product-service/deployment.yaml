apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ .Values.namespace }}
  labels:
    app: product-service
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.productService.replicaCount }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: {{ include "ecommerce.image" (dict "registry" $.Values.imageRegistry "repository" .Values.productService.image.repository "tag" .Values.productService.image.tag) }}
          imagePullPolicy: {{ .Values.productService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.productService.service.port }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: {{ include "ecommerce.databaseUrl" (dict "user" $.Values.postgres.user "passwordEnvVar" "POSTGRES_PASSWORD" "port" $.Values.postgres.service.port "database" .Values.productService.database) | quote }}
          resources:
            {{- toYaml .Values.productService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.productService.probes.liveness.path }}
              port: {{ .Values.productService.service.port }}
            initialDelaySeconds: {{ .Values.productService.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.productService.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.productService.probes.readiness.path }}
              port: {{ .Values.productService.service.port }}
            initialDelaySeconds: {{ .Values.productService.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.productService.probes.readiness.periodSeconds }}
