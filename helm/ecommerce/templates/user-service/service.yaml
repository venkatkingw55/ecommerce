apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: {{ .Values.namespace }}
  labels:
    app: user-service
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  type: {{ .Values.userService.service.type }}
  selector:
    app: user-service
  ports:
    - port: {{ .Values.userService.service.port }}
      targetPort: {{ .Values.userService.service.port }}
      name: http
